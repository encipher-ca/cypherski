<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CYPHERSKI</title>
  <meta name="description" content="CYPHERSKI" />
  <meta property="og:title" content="CYPHERSKI" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://cypherski.com" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #050505;
      --white: #f0ede8;
    }

    html, body {
      min-height: 100dvh;
      background: var(--black);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 56px;
      overflow-x: hidden;
    }

    #bg, #grain {
      position: fixed; inset: 0; pointer-events: none;
    }
    #bg    { z-index: 0; }
    #grain { z-index: 1; opacity: 0.3; }

    .vignette {
      position: fixed; inset: 0; z-index: 2;
      background: radial-gradient(ellipse at 50% 42%, transparent 15%, rgba(0,0,0,0.45) 58%, rgba(0,0,0,0.96) 100%);
      pointer-events: none;
    }

    .scanlines {
      position: fixed; inset: 0; z-index: 3;
      background: repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 3px);
      pointer-events: none;
      animation: flicker 14s infinite;
    }

    @keyframes flicker {
      0%, 91%, 93.5%, 100% { opacity: 1; }
      92% { opacity: 0.75; }
      93% { opacity: 1; }
    }

    .watermark {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-18deg);
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(80px, 22vw, 200px);
      letter-spacing: 0.06em;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,0.04);
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: none;
      z-index: 4;
      user-select: none;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 5;
    }

    .logo-wrap {
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
      width: 100%;
      text-align: center;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(28px, 8cqi, 52px);
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--white);
      text-transform: uppercase;
      display: block;
      width: 100%;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
      text-shadow: 0 0 60px rgba(255,255,255,0.12);
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16,1,0.3,1) 0.22s forwards;
    }

    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 24px;
      background: #000;
      border: 1px solid #1e1e1e;
      text-decoration: none;
      color: var(--white);
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .card::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
      transition: left 0.55s ease;
      pointer-events: none;
    }

    .card:hover::after { left: 150%; }
    .card:hover { border-color: #333; }

    .card-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-eyebrow {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #666;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.03em;
      line-height: 1.2;
    }

    .card-tag {
      display: inline-block;
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: 1px solid #282828;
      padding: 2px 7px;
      color: #555;
      width: fit-content;
      margin-top: 4px;
    }

    .card-arrow {
      font-size: 14px;
      color: #555;
      transition: transform 0.25s, color 0.25s;
      flex-shrink: 0;
    }

    .card:hover .card-arrow {
      transform: translate(3px, -3px);
      color: var(--white);
    }

    .divider-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      opacity: 0;
      animation: rise 0.8s ease 0.36s forwards;
    }

    .divider-line { flex: 1; height: 1px; background: #2a2a2a; }

    .divider-label {
      font-size: 8px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--white);
      white-space: nowrap;
    }

    .socials {
      display: flex;
      align-items: center;
      gap: 26px;
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16,1,0.3,1) 0.44s forwards;
    }

    .social-link {
      color: var(--white);
      display: flex;
      align-items: center;
      transition: color 0.2s, transform 0.2s;
    }

    .social-link:hover { color: #aaa; transform: translateY(-2px); }
    .social-link svg { width: 22px; height: 22px; fill: currentColor; }

    .footer {
      position: fixed;
      bottom: 20px;
      font-size: 9px;
      letter-spacing: 0.16em;
      color: var(--white);
      text-transform: uppercase;
      z-index: 6;
    }

    @media (max-width: 390px) {
      html, body { padding: 16px 16px 48px; }
      .page { gap: 28px; }
      .card { padding: 18px 18px; }
      .card-title { font-size: 16px; }
      .socials { gap: 24px; }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>
  <canvas id="grain"></canvas>
  <div class="vignette"></div>
  <div class="scanlines"></div>
  <div class="watermark">Cypherski</div>

  <div class="page">

    <div class="logo-wrap">
      <span class="logo-text">Cypherski</span>
    </div>

    <div class="cards">
      <a class="card" href="https://www.youtube.com/watch?v=jTr0Ew03W5A" target="_blank" rel="noopener">
        <span class="card-title">YouTube</span>
        <span class="card-arrow">↗</span>
      </a>

      <a class="card" href="https://www.type2ski.co/collabs" target="_blank" rel="noopener">
        <span class="card-title">Cypher x Type2 Skis</span>
        <span class="card-arrow">↗</span>
      </a>
    </div>

    <div class="divider-wrap">
      <div class="divider-line"></div>
      <span class="divider-label">Follow along</span>
      <div class="divider-line"></div>
    </div>

    <div class="socials">
      <a class="social-link" href="https://www.instagram.com/cypherski/" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.334 3.608 1.308.975.975 1.246 2.242 1.308 3.608.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.366-.334 2.633-1.308 3.608-.975.975-2.242 1.246-3.608 1.308-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.062-2.633-.334-3.608-1.308-.975-.975-1.246-2.242-1.308-3.608C2.175 15.584 2.163 15.204 2.163 12s.012-3.584.07-4.85c.062-1.366.334-2.633 1.308-3.608C4.516 2.497 5.783 2.226 7.15 2.163 8.416 2.105 8.796 2.163 12 2.163zm0-2.163C8.741 0 8.332.013 7.052.072 5.197.157 3.355.673 2.014 2.014.673 3.355.157 5.197.072 7.052.013 8.332 0 8.741 0 12c0 3.259.013 3.668.072 4.948.085 1.855.601 3.697 1.942 5.038 1.341 1.341 3.183 1.857 5.038 1.942C8.332 23.987 8.741 24 12 24c3.259 0 3.668-.013 4.948-.072 1.855-.085 3.697-.601 5.038-1.942 1.341-1.341 1.857-3.183 1.942-5.038C23.987 15.668 24 15.259 24 12c0-3.259-.013-3.668-.072-4.948-.085-1.855-.601-3.697-1.942-5.038C20.645.673 18.803.157 16.948.072 15.668.013 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zm0 10.162a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
      </a>
      <a class="social-link" href="https://www.tiktok.com/@cypher.ski" target="_blank" rel="noopener" aria-label="TikTok">
        <svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/></svg>
      </a>
      <a class="social-link" href="https://www.facebook.com/cypherski" target="_blank" rel="noopener" aria-label="Facebook">
        <svg viewBox="0 0 24 24"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.513c-1.491 0-1.956.93-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
      </a>
      <a class="social-link" href="https://www.youtube.com/watch?v=jTr0Ew03W5A" target="_blank" rel="noopener" aria-label="YouTube">
        <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      </a>
    </div>

  </div>

  <p class="footer">© Cypherski</p>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    const grainCanvas = document.getElementById('grain');
    const gctx = grainCanvas.getContext('2d');
    let w, h, t = 0;

    function resize() {
      w = canvas.width = grainCanvas.width = window.innerWidth;
      h = canvas.height = grainCanvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const flakes = Array.from({ length: 160 }, (_, i) => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: i < 90 ? Math.random() * 1.0 + 0.2 : Math.random() * 2.2 + 0.6,
      speed: i < 90 ? Math.random() * 0.4 + 0.1 : Math.random() * 0.9 + 0.3,
      drift: (Math.random() - 0.5) * 0.4,
      opacity: i < 90 ? Math.random() * 0.28 + 0.04 : Math.random() * 0.55 + 0.1,
      wobble: Math.random() * Math.PI * 2,
    }));

    function drawMountains(ctx, w, h) {
      ctx.beginPath();
      ctx.moveTo(0, h);
      ctx.lineTo(0, h * 0.55);
      ctx.bezierCurveTo(w*0.06,h*0.40, w*0.12,h*0.46, w*0.18,h*0.36);
      ctx.bezierCurveTo(w*0.24,h*0.26, w*0.28,h*0.36, w*0.34,h*0.30);
      ctx.bezierCurveTo(w*0.40,h*0.24, w*0.44,h*0.14, w*0.50,h*0.10);
      ctx.bezierCurveTo(w*0.56,h*0.06, w*0.60,h*0.18, w*0.66,h*0.24);
      ctx.bezierCurveTo(w*0.72,h*0.30, w*0.76,h*0.20, w*0.83,h*0.14);
      ctx.bezierCurveTo(w*0.90,h*0.08, w*0.95,h*0.24, w,h*0.32);
      ctx.lineTo(w, h);
      ctx.closePath();
      const farGrad = ctx.createLinearGradient(0, h*0.08, 0, h*0.6);
      farGrad.addColorStop(0, 'rgba(18,24,38,1)');
      farGrad.addColorStop(0.5, 'rgba(12,16,26,1)');
      farGrad.addColorStop(1, 'rgba(7,9,14,1)');
      ctx.fillStyle = farGrad;
      ctx.fill();

      const peaks = [
        { px: 0.50, py: 0.10, w: 0.07 },
        { px: 0.83, py: 0.14, w: 0.055 },
        { px: 0.18, py: 0.36, w: 0.04 },
      ];
      peaks.forEach(p => {
        ctx.beginPath();
        ctx.moveTo(p.px * w, p.py * h);
        ctx.lineTo((p.px - p.w*0.5)*w, (p.py + p.w*0.55)*h);
        ctx.lineTo((p.px + p.w*0.5)*w, (p.py + p.w*0.55)*h);
        ctx.closePath();
        const sg = ctx.createLinearGradient(p.px*w, p.py*h, p.px*w, (p.py+p.w*0.55)*h);
        sg.addColorStop(0, 'rgba(210,220,240,0.28)');
        sg.addColorStop(1, 'rgba(210,220,240,0.0)');
        ctx.fillStyle = sg;
        ctx.fill();
      });

      ctx.beginPath();
      ctx.moveTo(0, h);
      ctx.lineTo(0, h*0.68);
      ctx.bezierCurveTo(w*0.07,h*0.58, w*0.13,h*0.64, w*0.20,h*0.54);
      ctx.bezierCurveTo(w*0.27,h*0.46, w*0.32,h*0.52, w*0.38,h*0.48);
      ctx.bezierCurveTo(w*0.45,h*0.43, w*0.50,h*0.38, w*0.56,h*0.43);
      ctx.bezierCurveTo(w*0.62,h*0.48, w*0.67,h*0.42, w*0.74,h*0.46);
      ctx.bezierCurveTo(w*0.81,h*0.50, w*0.87,h*0.58, w*0.93,h*0.54);
      ctx.bezierCurveTo(w*0.97,h*0.52, w,h*0.56, w,h*0.58);
      ctx.lineTo(w, h);
      ctx.closePath();
      const midGrad = ctx.createLinearGradient(0, h*0.38, 0, h*0.75);
      midGrad.addColorStop(0, 'rgba(10,13,20,1)');
      midGrad.addColorStop(1, 'rgba(5,5,7,1)');
      ctx.fillStyle = midGrad;
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(0, h);
      ctx.lineTo(0, h*0.82);
      ctx.bezierCurveTo(w*0.05,h*0.76, w*0.11,h*0.80, w*0.18,h*0.72);
      ctx.bezierCurveTo(w*0.24,h*0.66, w*0.30,h*0.70, w*0.36,h*0.68);
      ctx.bezierCurveTo(w*0.44,h*0.64, w*0.50,h*0.60, w*0.57,h*0.64);
      ctx.bezierCurveTo(w*0.64,h*0.68, w*0.70,h*0.62, w*0.77,h*0.66);
      ctx.bezierCurveTo(w*0.84,h*0.70, w*0.90,h*0.76, w*0.96,h*0.73);
      ctx.bezierCurveTo(w*0.98,h*0.72, w,h*0.75, w,h*0.77);
      ctx.lineTo(w, h);
      ctx.closePath();
      ctx.fillStyle = '#050505';
      ctx.fill();
    }

    function drawAurora(ctx, w, h, t) {
      const bands = [
        { y: 0.05, hue: 188, sat: 55, lightness: 58, amp: 0.022, speed: 0.00032 },
        { y: 0.10, hue: 196, sat: 48, lightness: 55, amp: 0.018, speed: 0.00028 },
        { y: 0.16, hue: 182, sat: 62, lightness: 56, amp: 0.015, speed: 0.00038 },
      ];
      bands.forEach((b, bi) => {
        const baseY = b.y * h + Math.sin(t * b.speed + bi * 2.1) * b.amp * h;
        const grad = ctx.createLinearGradient(0, 0, w, 0);
        for (let i = 0; i <= 14; i++) {
          const wave = Math.sin(t * 0.00025 + i * 0.55 + bi * 1.8) * 0.016;
          const alpha = 0.03 + Math.abs(Math.sin(t * 0.0004 + i * 0.4 + bi)) * 0.08;
          grad.addColorStop(i / 14, `hsla(${b.hue + wave*160}, ${b.sat}%, ${b.lightness}%, ${alpha})`);
        }
        ctx.beginPath();
        ctx.moveTo(0, baseY);
        for (let x = 0; x <= w; x += 5) {
          const y = baseY + Math.sin(t * 0.00042 + x * 0.006 + bi * 1.3) * 26;
          ctx.lineTo(x, y);
        }
        ctx.lineTo(w, baseY + 60);
        ctx.lineTo(0, baseY + 60);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();
      });
    }

    const stars = Array.from({ length: 220 }, () => ({
      x: Math.random(),
      y: Math.random() * 0.62,
      r: Math.random() * 0.85 + 0.12,
      opacity: Math.random() * 0.65 + 0.08,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.0025 + 0.0008,
    }));

    function drawStars(ctx, w, h, t) {
      stars.forEach(s => {
        const flicker = 0.78 + Math.sin(t * s.speed + s.twinkle) * 0.22;
        ctx.beginPath();
        ctx.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(230,238,255,${s.opacity * flicker})`;
        ctx.fill();
      });
    }

    let lastGrain = 0;
    function drawGrain(ts) {
      if (ts - lastGrain > 70) {
        const img = gctx.createImageData(w, h);
        const d = img.data;
        for (let i = 0; i < d.length; i += 4) {
          const v = Math.random() * 14;
          d[i] = d[i+1] = d[i+2] = v;
          d[i+3] = Math.random() * 22;
        }
        gctx.putImageData(img, 0, 0);
        lastGrain = ts;
      }
    }

    function draw(ts) {
      t = ts;
      ctx.clearRect(0, 0, w, h);

      const sky = ctx.createLinearGradient(0, 0, 0, h * 0.72);
      sky.addColorStop(0,   '#020508');
      sky.addColorStop(0.35,'#040810');
      sky.addColorStop(0.7, '#060b16');
      sky.addColorStop(1,   '#07090e');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h * 0.72);

      const hglow = ctx.createLinearGradient(0, h*0.40, 0, h*0.68);
      hglow.addColorStop(0, 'transparent');
      hglow.addColorStop(0.6, 'rgba(14,30,60,0.25)');
      hglow.addColorStop(1, 'rgba(8,18,36,0.5)');
      ctx.fillStyle = hglow;
      ctx.fillRect(0, h*0.40, w, h*0.30);

      drawAurora(ctx, w, h, t);
      drawStars(ctx, w, h, t);
      drawMountains(ctx, w, h);

      flakes.forEach(f => {
        ctx.beginPath();
        ctx.arc(((f.x % w) + w) % w, ((f.y % h) + h) % h, f.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${f.opacity})`;
        ctx.fill();
        f.y += f.speed;
        f.x += f.drift + Math.sin(t * 0.001 + f.wobble) * 0.18;
        if (f.y > h + 4) { f.y = -4; f.x = Math.random() * w; }
      });

      drawGrain(ts);
      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
  </script>

</body>
