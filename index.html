<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CYPHERSKI</title>
  <meta name="description" content="CYPHERSKI" />
  <meta property="og:title" content="CYPHERSKI" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://cypherski.com" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f2f0eb;
      --grey: #555;
      --accent: #b0a898;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 10;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 48px 24px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadein 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }

    @keyframes fadein {
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: min(320px, 68vw);
      display: block;
      filter: invert(1);
    }

    .divider {
      width: 32px;
      height: 1px;
      background: #222;
    }

    /* Primary links */
    .primary-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .link {
      color: var(--accent);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-bottom: 1px solid transparent;
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .link:hover {
      color: var(--white);
      border-color: var(--white);
    }

    /* Social icons row */
    .socials {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .social-link {
      color: var(--grey);
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }

    .social-link:hover {
      color: var(--white);
    }

    .social-link svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .footer {
      position: fixed;
      bottom: 20px;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: #252525;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
